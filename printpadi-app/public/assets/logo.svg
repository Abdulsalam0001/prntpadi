<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="140" height="35">
  <!-- PrintPadi Logo -->
  <defs>
    <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Printer/Printer Icon -->
  <g transform="translate(20, 20)">
    <rect x="0" y="20" width="40" height="30" rx="3" fill="url(#brand-gradient)"/>
    <rect x="8" y="10" width="24" height="15" rx="2" fill="url(#brand-gradient)"/>
    <rect x="5" y="40" width="30" height="4" rx="1" fill="#764ba2"/>
    <!-- Paper coming out -->
    <rect x="12" y="0" width="16" height="12" rx="1" fill="white" stroke="#667eea" stroke-width="1"/>
  </g>
  
  <!-- Text -->
  <text x="75" y="45" font-family="'Inter', Arial, sans-serif" font-size="32" font-weight="800" fill="url(#brand-gradient)">
    PrintPadi
  </text>
  <text x="78" y="65" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#636E72" letter-spacing="2">
    YOUR PRINT PARTNER
  </text>
</svg>